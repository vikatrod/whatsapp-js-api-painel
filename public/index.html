<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel WhatsApp</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="navbar">
    <h1>🤖 Painel WhatsApp</h1>
    <button id="logoutBtn" class="btn btn-danger">Sair</button>
  </header>

  <main class="container">
    <!-- Status -->
    <section class="card">
      <h2>📊 Status</h2>
      <div id="statusArea" class="status-area">
        <p>Carregando...</p>
      </div>
    </section>

    <!-- QR Code -->
    <section class="card" id="qrSection" style="display:none;">
      <h2>🔑 QR Code</h2>
      <p class="hint">Escaneie com seu WhatsApp para conectar</p>
      <div id="qrContainer" class="qr-container"></div>
    </section>

    <!-- Ações Administrativas -->
    <section class="card">
      <h2>⚙️ Ações Administrativas</h2>
      <div class="actions-grid">
        <button id="btnUpdateLib" class="btn btn-primary">
          📦 Atualizar whatsapp-web.js
        </button>
        <button id="btnClearCache" class="btn btn-warning">
          🧹 Limpar Cache / Sessão
        </button>
        <button id="btnRestartClient" class="btn btn-primary">
          ♻️ Reiniciar Cliente
        </button>
        <button id="btnRestartService" class="btn btn-danger">
          🔁 Reiniciar Serviço (PM2)
        </button>
      </div>
      <div id="actionOutput" class="output-box" style="display:none;"></div>
    </section>

    <!-- Enviar Mensagem -->
    <section class="card">
      <h2>💬 Enviar Mensagem de Teste</h2>
      <form id="sendForm" class="form-inline">
        <input type="text" id="sendId" placeholder="Número ou ID (ex: 5511999999999)" required />
        <input type="text" id="sendMsg" placeholder="Mensagem" required />
        <button type="submit" class="btn btn-success">Enviar</button>
      </form>
      <div id="sendResult" class="output-box" style="display:none;"></div>
    </section>
  </main>

  <footer class="footer">
    <p>WhatsApp API Manager</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
